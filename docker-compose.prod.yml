services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set (e.g. in .env)}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (e.g. in .env)}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set (e.g. in .env)}
    ports:
      # Host 5433 -> container 5432 (avoids clashing with a local Postgres on 5432).
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER must be set (e.g. in .env)}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:?POSTGRES_USER must be set (e.g. in .env)}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (e.g. in .env)}@db:5432/${POSTGRES_DB:?POSTGRES_DB must be set (e.g. in .env)}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set (e.g. in .env) — no insecure default}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      SEED_ON_START: ${SEED_ON_START:-false}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --timeout-keep-alive 30"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status == 200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  # Scheduled logical backups of the Postgres database. Runs pg_dump on a cron
  # schedule (default: daily at 02:00) and keeps a rolling retention window.
  # Dumps land in the `pgbackups` volume at /backups (latest/, daily/, weekly/,
  # monthly/). Restore with: zcat <dump>.sql.gz | psql -U $POSTGRES_USER $POSTGRES_DB
  db-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set (e.g. in .env)}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (e.g. in .env)}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set (e.g. in .env)}
      # Daily at 02:00 by default; override with a standard cron expression.
      SCHEDULE: ${BACKUP_SCHEDULE:-@daily}
      # Rolling retention (days / weeks / months of dumps to keep).
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${BACKUP_KEEP_MONTHS:-6}
      # gzip the dumps; healthcheck fails if the latest backup is too old/missing.
      POSTGRES_EXTRA_OPTS: "-Z6 --no-owner"
      HEALTHCHECK_PORT: 8080
    volumes:
      - pgbackups:/backups
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  pgbackups:

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set (e.g. in .env)}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (e.g. in .env)}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set (e.g. in .env)}
    # No host port: the database is reachable only on the internal compose network
    # (api + db-backup). Don't publish 5432/5433 to the host in production.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER must be set (e.g. in .env)}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:?POSTGRES_USER must be set (e.g. in .env)}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (e.g. in .env)}@db:5432/${POSTGRES_DB:?POSTGRES_DB must be set (e.g. in .env)}
      # Optional restricted-role URL for RLS enforcement (see .env.example). Empty → owner.
      APP_DATABASE_URL: ${APP_DATABASE_URL:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set (e.g. in .env) — no insecure default}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS must be set (your web origin) — no localhost default}
      SEED_ON_START: ${SEED_ON_START:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      # Enable only when a trusted reverse proxy sets X-Forwarded-For (then per-IP rate
      # limits key on the real client instead of the proxy address).
      RATE_LIMIT_TRUST_FORWARDED: ${RATE_LIMIT_TRUST_FORWARDED:-false}
    depends_on:
      db:
        condition: service_healthy
    # Published for a TLS-terminating reverse proxy to sit in front of. Do NOT expose
    # this port directly to the internet without HTTPS termination ahead of it.
    ports:
      - "8000:8000"
    # No source bind-mount in production — the image ships the code. --workers for
    # concurrency; no --reload.
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --timeout-keep-alive 30"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status == 200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Baked into the static build; point at the public API origin (https://...).
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL must be set (your public API origin)}
    restart: unless-stopped
    depends_on:
      - api
    # Static assets served by nginx. Front this with your TLS terminator (or map 443).
    ports:
      - "80:80"

  # Scheduled logical backups of the Postgres database. Runs pg_dump on a cron
  # schedule (default: daily at 02:00) and keeps a rolling retention window.
  # Dumps land in the `pgbackups` volume at /backups (latest/, daily/, weekly/,
  # monthly/). Restore with: zcat <dump>.sql.gz | psql -U $POSTGRES_USER $POSTGRES_DB
  db-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set (e.g. in .env)}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (e.g. in .env)}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set (e.g. in .env)}
      # Daily at 02:00 by default; override with a standard cron expression.
      SCHEDULE: ${BACKUP_SCHEDULE:-@daily}
      # Rolling retention (days / weeks / months of dumps to keep).
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${BACKUP_KEEP_MONTHS:-6}
      # gzip the dumps; healthcheck fails if the latest backup is too old/missing.
      POSTGRES_EXTRA_OPTS: "-Z6 --no-owner"
      HEALTHCHECK_PORT: 8080
    volumes:
      - pgbackups:/backups
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  pgbackups:
